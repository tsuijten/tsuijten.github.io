{%- assign c = site.data[site.active_lang].common -%}
<header class="site-header" data-header>
  <div class="container header-inner">
    <a class="brand" href="/">
      <span class="brand-name">{{ c.brand }}</span>
      <span class="brand-tag mono">// {{ c.brand_tag }}</span>
    </a>

    <button class="nav-toggle" data-nav-toggle aria-expanded="false" aria-controls="site-nav" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav" id="site-nav" data-nav aria-label="Hoofdmenu">
      {%- for item in c.nav -%}
        <a class="nav-link" href="{{ item.url }}">{{ item.title }}</a>
      {%- endfor -%}
      <span class="nav-divider" aria-hidden="true"></span>
      <div class="nav-actions">
        <span class="lang-switcher">{% include lang-switcher.html %}</span>
        <button class="theme-toggle" data-theme-toggle aria-label="{{ c.footer.theme_toggle }}" title="{{ c.footer.theme_toggle }}">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </div>
    </nav>
  </div>
</header>
<div class="nav-scrim" data-nav-scrim></div>
